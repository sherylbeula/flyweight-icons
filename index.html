<!DOCTYPE html>
<html>
<head>
    <title>Flyweight Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="navbar">
    <h2>Flyweight Dashboard</h2>
    <button onclick="toggleDarkMode()">🌙</button>
</div>

<h1>Icon Management System</h1>
<p class="subtitle">Optimized using Flyweight Pattern</p>

<div class="controls">
    <input type="text" id="search" placeholder="Search..." onkeyup="filterIcons()">
    
    <select id="filter" onchange="filterIcons()">
    <option value="all">All</option>
    <option value="star">Star</option>
    <option value="heart">Heart</option>
    <option value="bell">Bell</option>
    <option value="user">User</option>
    <option value="search">Search</option>
    <option value="settings">Settings</option>
</select>

    <button onclick="loadIcons()">Load 1000 Icons</button>
</div>

<p id="count">Icons: 0</p>

<canvas id="memoryChart"></canvas>

<div id="iconContainer"></div>

<!-- Popup -->
<div id="popup" class="popup">
    <div class="popup-content">
        <span onclick="closePopup()">✖</span>
        <img id="popupImg">
        <p id="popupText"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
