<!DOCTYPE html>
<html>
<head>
    <title>Flyweight Icon Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1><p style="color:white;">Efficient rendering of 1000+ icons using Flyweight Pattern</p></h1>

<div class="controls">
    <input type="text" id="search" placeholder="Search icon type..." onkeyup="filterIcons()">
    
    <select id="filter" onchange="filterIcons()">
        <option value="all">All</option>
        <option value="star">Star</option>
        <option value="heart">Heart</option>
    </select>

    <button onclick="loadIcons()">Load Icons</button>
</div>

<p id="count">Icons: 0</p>

<div id="iconContainer"></div>

<script src="script.js"></script>
</body>
</html>
